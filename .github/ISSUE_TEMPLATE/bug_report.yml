name: Bug Report
description: Report a bug in treval
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: treval version
      placeholder: "e.g., 0.2.3"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.11.8"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 22.04, macOS 14"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or commands to reproduce the bug
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Error Output
      description: Full traceback if available
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other info that might help
